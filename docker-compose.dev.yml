services:
  radtrack-api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    container_name: radtrack-api-dev
    working_dir: /workspace
    command:
      - bash
      - -lc
      - npm install && npm run dev
    environment:
      PORT: "8192"
      TRUST_PROXY: "0"
      MONOLITH: "false"
      RADTRACK_BUILD_COMMIT: ${RADTRACK_BUILD_COMMIT:-unknown}
      RADTRACK_CONFIG_PATH: /config/radtrack.config.json5
      RADTRACK_SECRETS_PATH: /config/radtrack.secrets.json5
      LOG_CONSOLE_FORMAT: text
    volumes:
      - ./api:/workspace
      - radtrack-api-node-modules:/workspace/node_modules
      - ./config/compose/gui-api:/config:ro
    ports:
      - "8192:8192"
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  radtrack-wui:
    image: node:24-bookworm-slim
    container_name: radtrack-wui-dev
    working_dir: /workspace
    command:
      - bash
      - /workspace/wui/scripts/dev-entrypoint.sh
    environment:
      PUBLIC_API_URL: ""
      INTERNAL_API_URL: http://radtrack-api:8192
      PORT: "4096"
      RADTRACK_BUILD_COMMIT: ${RADTRACK_BUILD_COMMIT:-unknown}
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    volumes:
      - ./:/workspace
      - radtrack-wui-node-modules:/workspace/node_modules
    ports:
      - "4096:4096"
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: radtrack-postgres-dev
    environment:
      POSTGRES_USER: radtrack
      POSTGRES_PASSWORD: radtrack
      POSTGRES_DB: radtrack
    ports:
      - "5432:5432"
    volumes:
      - radtrack-postgres-dev:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: radtrack-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - radtrack-redis-dev:/data
    restart: unless-stopped

volumes:
  radtrack-api-node-modules:
  radtrack-wui-node-modules:
  radtrack-postgres-dev:
  radtrack-redis-dev:
